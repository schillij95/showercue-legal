<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ShowerCue Legal</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4fbfc;
        --surface: #ffffff;
        --text: #14323a;
        --muted: #5a7880;
        --border: #d7e9ed;
        --accent: #1f9bb5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #eef9fb 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 56px 20px 72px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 16px 40px rgba(17, 50, 58, 0.08);
      }

      h1, h2 {
        margin: 0 0 16px;
      }

      h1 {
        font-size: clamp(2rem, 5vw, 2.8rem);
        letter-spacing: -0.03em;
      }

      p {
        line-height: 1.7;
        color: var(--muted);
      }

      ul {
        line-height: 1.7;
        padding-left: 20px;
      }

      a {
        color: var(--accent);
      }

      .eyebrow {
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--accent);
      }

      .meta {
        margin-top: 20px;
        font-size: 0.95rem;
      }

      .footer-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin-top: 28px;
        padding-top: 18px;
        border-top: 1px solid var(--border);
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <p class="eyebrow">ShowerCue Legal</p>
        <h1>Privacy and terms for ShowerCue</h1>
        <p>
          Read the privacy policy and terms of use for ShowerCue here.
        </p>
        <p class="meta">Last updated: March 30, 2026</p>
        <ul>
          <li><a href="./privacy.html">Privacy Policy</a></li>
          <li><a href="./terms.html">Terms of Use</a></li>
        </ul>
        <nav class="footer-nav" aria-label="Legal site navigation">
          <a href="./privacy.html">Privacy Policy</a>
          <a href="./terms.html">Terms of Use</a>
        </nav>
      </section>
    </main>
  </body>
</html>
