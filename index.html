<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ShowerCue Legal</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4fbfc;
        --surface: #ffffff;
        --text: #14323a;
        --muted: #5a7880;
        --border: #d7e9ed;
        --accent: #1f9bb5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #eef9fb 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 20px 72px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 16px 40px rgba(17, 50, 58, 0.08);
      }

      h1, h2 {
        margin: 0 0 16px;
      }

      p {
        line-height: 1.6;
        color: var(--muted);
      }

      ul {
        line-height: 1.7;
        padding-left: 20px;
      }

      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>ShowerCue Legal</h1>
        <p>Public legal pages for the ShowerCue Android app.</p>
        <ul>
          <li><a href="./privacy.html">Privacy Policy</a></li>
          <li><a href="./terms.html">Terms of Use</a></li>
        </ul>
      </section>
    </main>
  </body>
</html>
